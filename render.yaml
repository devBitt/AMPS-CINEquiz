services:
  - type: web
    name: cinequiz
    env: node
    plan: free
    buildCommand: npm install pnpm && npx pnpm install && npx pnpm run build
    startCommand: node --enable-source-maps packages/api-server/dist/index.mjs
    envVars:
      - key: NODE_VERSION
        value: 22.13.0
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
